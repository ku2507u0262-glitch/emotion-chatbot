<!DOCTYPE html>
<html>
<head>
    <title>Emotion AI Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            background: radial-gradient(circle at top, #1f2937, #0f172a);
            color: #e5e7eb;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: rgba(43, 43, 43, 0.4);
            backdrop-filter: blur(10px);
            padding: 20px;
        }

        .new-chat {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: transparent;
            color: #e5e7eb;
            cursor: pointer;
        }

        .new-chat:hover {
            background: rgba(255,255,255,0.05);
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 15px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #374151;
        }

        #emotionDisplay {
            font-size: 12px;
            opacity: 0.7;
        }

        /* CHAT AREA */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            display: flex;
        }

        .msg.user {
            justify-content: flex-end;
        }

        .msg.bot {
            justify-content: flex-start;
        }

        /* BUBBLES */
        .bubble {
            max-width: 60%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            white-space: pre-wrap;
        }

        .user .bubble {
            background: linear-gradient(135deg, #983bb1ff, #732c91ff);
            color: black;
            border-bottom-right-radius: 6px;
        }

        .bot .bubble {
            background: rgba(177, 66, 192, 0.38);
            border: 1px solid rgba(108, 2, 109, 0.69);
            border-bottom-left-radius: 6px;
        }

        /* TYPING INDICATOR */
        .typing-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background: #e5e7eb;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        /* INPUT */
        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: rgba(62, 60, 60, 0.3);
            backdrop-filter: blur(10px);
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.08);
            color: white;
        }

        button {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #c022c5ff, #c04adeff);
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
</div>

<div class="main">

    <div class="header">
        Emotion AI Chatbot
        <div id="emotionDisplay">Emotion: -- | Face: --</div>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="message" placeholder="Message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
let startTime = 0;
let keyCount = 0;
let backspaceCount = 0;
let camActive = false;
let chatHistory = [];

// ---------- APPEND BUBBLE ----------
function appendBubble(role, text, save = true) {
    const chatBox = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text; // fix: textContent prevents XSS
    div.appendChild(bubble);
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    if (save) {
        chatHistory.push({ role, text });
        localStorage.setItem("chatHistory", JSON.stringify(chatHistory));
    }
}

// ---------- LOAD HISTORY (fix: safe JSON-based storage) ----------
window.onload = () => {
    const saved = localStorage.getItem("chatHistory");
    if (!saved) return;
    try {
        chatHistory = JSON.parse(saved);
        chatHistory.forEach(({ role, text }) => appendBubble(role, text, false));
    } catch(e) {
        localStorage.removeItem("chatHistory");
    }
};

// ---------- CAMERA (fix: POST instead of GET) ----------
function startCam() {
    if (!camActive) {
        fetch("/camera/start", { method: "POST" });
        camActive = true;
    }
}

function stopCam() {
    if (camActive) {
        fetch("/camera/stop", { method: "POST" });
        camActive = false;
    }
}

const input = document.getElementById("message");

input.addEventListener("focus", () => {
    startTime = Date.now();
    keyCount = 0;       // fix: reset counts on each new message
    backspaceCount = 0;
});

input.addEventListener("input", () => {
    startCam();
    // fix: removed premature stopCam timer — camera stops after server responds
});

input.addEventListener("keydown", (e) => {
    keyCount++;
    if (e.key === "Backspace") backspaceCount++;
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

// ---------- SEND ----------
function sendMessage() {
    const msg = input.value.trim();
    if (!msg) return;

    appendBubble("user", msg);
    input.value = "";

    const typingTime = (Date.now() - startTime) / 1000;

    // Typing indicator
    const chatBox = document.getElementById("chatBox");
    const typingDiv = document.createElement("div");
    typingDiv.className = "msg bot";
    typingDiv.id = "typingIndicator";
    typingDiv.innerHTML = `<div class="bubble typing-dots"><span></span><span></span><span></span></div>`;
    chatBox.appendChild(typingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: msg,
            typing_time: typingTime,
            key_count: keyCount,
            backspace_count: backspaceCount
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("typingIndicator")?.remove();
        stopCam(); // fix: stop camera after response, not on a timer

        appendBubble("bot", data.reply);

        document.getElementById("emotionDisplay").innerText =
            "Emotion: " + data.emotion + " | Face: " + data.face;

        keyCount = 0;
        backspaceCount = 0;
    })
    .catch(() => { // fix: handle server errors
        document.getElementById("typingIndicator")?.remove();
        stopCam();
        appendBubble("bot", "Something went wrong. Please try again.");
    });
}

// ---------- NEW CHAT ----------
function newChat() {
    document.getElementById("chatBox").innerHTML = "";
    document.getElementById("emotionDisplay").innerText = "Emotion: -- | Face: --"; // fix: reset display
    localStorage.removeItem("chatHistory");
    chatHistory = [];
    stopCam(); // fix: stop camera on new chat
}
</script>

</body>
</html>
